name: Extra 04 - Cache Dependencies

on:
  push:
    branches:
      - test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-with-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python con cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Ejecutar tests
        run: pytest
