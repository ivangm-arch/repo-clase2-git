name: Extra 10 - GitHub Models Demo

on:
  workflow_dispatch:
    inputs:
      texto:
        description: 'Texto a resumir'
        required: true
        default: 'GitHub Actions permite automatizar flujos de CI/CD.'

permissions:
  contents: read
  models: read

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Preparar payload
        run: |
          jq -n \
            --arg text "${{ inputs.texto }}" \
            '{
              model: "openai/gpt-4o",
              messages: [
                {
                  role: "system",
                  content: "Resume el texto en una frase clara y breve."
                },
                {
                  role: "user",
                  content: $text
                }
              ]
            }' > payload.json
          echo "=== Payload preparado ===" 
          cat payload.json | jq .

      - name: Invocar GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d @payload.json | tee response.json

      - name: Mostrar respuesta del modelo
        run: |
          echo "=== Respuesta del modelo ===" 
          cat response.json | jq .
